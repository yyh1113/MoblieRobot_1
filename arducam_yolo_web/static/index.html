<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arducam USB · BPU YOLO — RDK X5</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --good: #3fb950;
      --warn: #d29922;
      --bad: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 16px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }
    .stream-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .stream-wrap {
      position: relative;
      width: 100%;
      background: #000;
      aspect-ratio: 4 / 3;
    }
    .stream-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .stream-meta {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
    }
    .side {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .stat-value.good { color: var(--good); }
    .stat-value.warn { color: var(--warn); }
    .stat-value.bad  { color: var(--bad); }
    .det-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 320px;
      overflow-y: auto;
    }
    .det-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .det-item:last-child { border-bottom: none; }
    .det-name { font-weight: 500; }
    .det-score {
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      font-weight: 600;
    }
    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 8px 0;
    }
    a { color: var(--accent); text-decoration: none; }
    .action-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .action-btn:hover {
      background: #478ed9;
    }
    .action-btn:active {
      background: #3876c4;
    }
  </style>
</head>
<body>
  <header>
    <h1>Arducam USB · BPU YOLO — RDK X5</h1>
    <div>
      <span class="pill" id="model-pill">loading…</span>
    </div>
  </header>
  <main>
    <div class="stream-card">
      <div class="stream-wrap">
        <img id="stream" alt="MJPEG stream" />
      </div>
      <div class="stream-meta">
        <span>URL: <code id="stream-url"></code></span>
        <span>Snapshot: <a href="/api/snapshot">/api/snapshot</a></span>
        <span>Detections JSON: <a href="/api/detections">/api/detections</a></span>
      </div>
    </div>
    <aside class="side">
      <div class="card">
        <h2>Pipeline</h2>
        <div class="stats">
          <div class="stat">
            <span class="stat-label">Inference FPS</span>
            <span class="stat-value" id="inf-fps">–</span>
          </div>
          <div class="stat">
            <span class="stat-label">Inference (ms)</span>
            <span class="stat-value" id="inf-ms">–</span>
          </div>
          <div class="stat">
            <span class="stat-label">Stream FPS</span>
            <span class="stat-value" id="stream-fps">–</span>
          </div>
          <div class="stat">
            <span class="stat-label">Stream Latency</span>
            <span class="stat-value" id="stream-latency">–</span>
          </div>
          <div class="stat">
            <span class="stat-label">Detections</span>
            <span class="stat-value" id="det-count">0</span>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>Locker Control</h2>
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <div style="display: flex; gap: 10px;">
            <button id="btn-open" class="action-btn" style="background: var(--good);">Open (열기)</button>
            <button id="btn-close" class="action-btn" style="background: var(--bad);">Close (닫기)</button>
          </div>
          <div style="display: flex; gap: 6px; align-items: center; margin-top: 5px;">
            <span style="font-size: 11px; color: var(--muted); min-width: 60px;">Manual:</span>
            <button id="btn-angle-0" class="action-btn" style="background: #444; padding: 6px 2px; font-size: 11px;">0°</button>
            <button id="btn-angle-90" class="action-btn" style="background: #444; padding: 6px 2px; font-size: 11px;">90°</button>
            <button id="btn-angle-180" class="action-btn" style="background: #444; padding: 6px 2px; font-size: 11px;">180°</button>
          </div>
          <div style="display: flex; gap: 10px; margin-top: 5px;">
            <button id="btn-request" class="action-btn" style="background: var(--accent);">Deposit (보관)</button>
            <button id="btn-return" class="action-btn" style="background: #6f42c1;">Return (반출)</button>
          </div>
          <span id="return-status" style="font-size: 11px; text-align: center; display: block; min-height: 16px;"></span>
        </div>
      </div>
      <div class="card">
        <h2>Latest Detections</h2>
        <ul class="det-list" id="det-list">
          <li class="empty">Waiting for detections…</li>
        </ul>
      </div>
    </aside>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    const streamUrl = "/video_feed?t=" + Date.now();
    $("stream").src = streamUrl;
    $("stream-url").textContent = location.origin + streamUrl;
    $("model-pill").textContent = "BPU · 10 TOPS";

    function colorForFps(v) {
      if (v >= 25) return "good";
      if (v >= 10) return "warn";
      return "bad";
    }
    function colorForMs(v) {
      if (v > 0 && v <= 33) return "good";
      if (v <= 50) return "warn";
      return "bad";
    }

    async function refresh() {
      try {
        const r = await fetch("/api/detections", { cache: "no-store" });
        if (!r.ok) return;
        const j = await r.json();
        const s = j.stats || {};
        $("inf-fps").textContent = (s.inference_fps ?? 0).toFixed(1);
        $("inf-fps").className = "stat-value " + colorForFps(s.inference_fps ?? 0);
        $("inf-ms").textContent = (s.inference_ms ?? 0).toFixed(1);
        $("inf-ms").className = "stat-value " + colorForMs(s.inference_ms ?? 0);
        $("stream-fps").textContent = s.stream_fps ?? "–";
        $("stream-latency").textContent = ((s.capture_to_publish_ms ?? 0).toFixed(1)) + " ms";
        $("stream-latency").className = "stat-value " + colorForMs(s.capture_to_publish_ms ?? 0);
        $("det-count").textContent = s.detection_count ?? 0;

        const list = $("det-list");
        const dets = (j.detections || []).slice().sort((a, b) => b.score - a.score);
        if (dets.length === 0) {
          list.innerHTML = '<li class="empty">No objects in this frame.</li>';
        } else {
          list.innerHTML = dets.map(d =>
            `<li class="det-item"><span class="det-name">${d.class_name}</span>` +
            `<span class="det-score">${(d.score * 100).toFixed(1)}%</span></li>`
          ).join("");
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function setAngle(angle) {
      const statusSpan = $("return-status");
      statusSpan.textContent = `Setting angle to ${angle}°...`;
      statusSpan.style.color = "var(--warn)";
      try {
        const r = await fetch(`/api/door/angle/${angle}`);
        if (r.ok) {
          statusSpan.textContent = `Set to ${angle}° successfully`;
          statusSpan.style.color = "var(--good)";
        } else {
          statusSpan.textContent = `Failed to set to ${angle}°`;
          statusSpan.style.color = "var(--bad)";
        }
      } catch (e) {
        statusSpan.textContent = "Error: " + e.message;
        statusSpan.style.color = "var(--bad)";
      }
      setTimeout(() => { statusSpan.textContent = ""; }, 3000);
    }

    $("btn-angle-0").addEventListener("click", () => setAngle(0));
    $("btn-angle-90").addEventListener("click", () => setAngle(90));
    $("btn-angle-180").addEventListener("click", () => setAngle(180));

    $("btn-open").addEventListener("click", async () => {
      const statusSpan = $("return-status");
      statusSpan.textContent = "Opening door...";
      statusSpan.style.color = "var(--warn)";
      try {
        const r = await fetch("/api/door/open");
        if (r.ok) {
          statusSpan.textContent = "Door opened (문 열림)";
          statusSpan.style.color = "var(--good)";
        } else {
          statusSpan.textContent = "Failed to open door";
          statusSpan.style.color = "var(--bad)";
        }
      } catch (e) {
        statusSpan.textContent = "Error: " + e.message;
        statusSpan.style.color = "var(--bad)";
      }
      setTimeout(() => { statusSpan.textContent = ""; }, 3000);
    });

    $("btn-close").addEventListener("click", async () => {
      const statusSpan = $("return-status");
      statusSpan.textContent = "Closing door...";
      statusSpan.style.color = "var(--warn)";
      try {
        const r = await fetch("/api/door/close");
        if (r.ok) {
          statusSpan.textContent = "Door closed (문 닫힘)";
          statusSpan.style.color = "var(--good)";
        } else {
          statusSpan.textContent = "Failed to close door";
          statusSpan.style.color = "var(--bad)";
        }
      } catch (e) {
        statusSpan.textContent = "Error: " + e.message;
        statusSpan.style.color = "var(--bad)";
      }
      setTimeout(() => { statusSpan.textContent = ""; }, 3000);
    });

    $("btn-request").addEventListener("click", async () => {
      const statusSpan = $("return-status");
      statusSpan.textContent = "Starting deposit sequence...";
      statusSpan.style.color = "var(--warn)";
      try {
        const r = await fetch("/api/request");
        if (r.ok) {
          statusSpan.textContent = "Deposit complete! (사진 저장됨)";
          statusSpan.style.color = "var(--good)";
          $("stream").src = "/video_feed?t=" + Date.now();
        } else {
          statusSpan.textContent = "Deposit failed or timed out";
          statusSpan.style.color = "var(--bad)";
        }
      } catch (e) {
        statusSpan.textContent = "Error: " + e.message;
        statusSpan.style.color = "var(--bad)";
      }
      setTimeout(() => { statusSpan.textContent = ""; }, 4000);
    });

    $("btn-return").addEventListener("click", async () => {
      const statusSpan = $("return-status");
      statusSpan.textContent = "Processing return...";
      statusSpan.style.color = "var(--warn)";
      try {
        const r = await fetch("/api/return");
        if (r.ok) {
          statusSpan.textContent = "Success (Door Opened / LED Blue)";
          statusSpan.style.color = "var(--good)";
        } else {
          statusSpan.textContent = "Failed to open locker";
          statusSpan.style.color = "var(--bad)";
        }
      } catch (e) {
        statusSpan.textContent = "Error: " + e.message;
        statusSpan.style.color = "var(--bad)";
      }
      setTimeout(() => { statusSpan.textContent = ""; }, 4000);
    });

    refresh();
    setInterval(refresh, 500);
  </script>
</body>
</html>
