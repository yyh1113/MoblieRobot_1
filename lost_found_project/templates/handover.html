<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>수령 완료 처리</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background: #FAFAFA; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .box { width: 500px; padding: 40px; background: white; border: 1px solid #DFDFDF; border-radius: 12px; }
    .title { font-size: 22px; font-weight: 700; margin-bottom: 30px; text-align: center; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 14px; font-weight: 600; color: #666; margin-bottom: 6px; }
    .input-group input { width: 100%; height: 48px; padding: 0 14px; border: 1px solid #DFDFDF; border-radius: 6px; font-size: 16px; outline: none; }
    .btn-action { width: 100%; height: 50px; background: #2087D6; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>
<div class="box">
  <div class="title">[{{ item.name }}] 수령 완료 처리</div>
  
  <div class="input-group">
    <label>수령인 이름</label>
    <input type="text" placeholder="이름을 입력하세요">
  </div>
  <div class="input-group">
    <label>연락처</label>
    <input type="text" placeholder="연락처를 입력하세요">
  </div>
  <div class="input-group">
    <label>학번</label>
    <input type="text" placeholder="학번을 입력하세요">
  </div>

  <button class="btn-action" onclick="finishHandover()">완료 및 저장</button>
  <button class="btn-action" style="background: #C1C1C1; margin-top: 10px;" onclick="history.back()">취소</button>
</div>

<script>
  function finishHandover() {
    alert("수령 처리가 완료되었습니다!");
    window.location.href = '/lost-items'; // 처리 후 목록으로 이동
  }
</script>
</body>
</html>
